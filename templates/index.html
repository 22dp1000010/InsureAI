<!DOCTYPE html>
<html>
<head>
    <title>{{ app_name }}</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='/style.css') }}"
    >
</head>

<body>

    <div class="container">

        <h1>{{ app_name }}</h1>

        <div id="chat-box"></div>

        <div class="input-area">

            <input
                type="text"
                id="message"
                placeholder="Ask about insurance..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

    <script
        src="{{ url_for('static', path='/app.js') }}"
    ></script>

</body>
</html>
